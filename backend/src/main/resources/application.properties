spring.application.name=backend

# Tomcat
server.port=${SERVER_PORT:8081}

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/Yallatn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA — on laisse Hibernate gérer uniquement la table games via ddl-auto
# Les autres tables existantes ne seront pas touchées
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
# Ignorer les erreurs DDL (tables existantes malformées)
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

app.cors.allowed-origins=http://localhost:4200

# ImgBB
imgbb.base-url=https://api.imgbb.com/1/upload
imgbb.api.key=${IMGBB_API_KEY:e452689f33e067d1405cf2041ec56628}
