<div class="flight-search-panel">
  <div class="panel-block">
    <h2 class="block-title">Search flights</h2>
    <div class="fields-stack">
      <div class="field-block">
        <label class="field-label" for="flight-dest">Destination (city, airport or code)</label>
        <input
          pInputText
          id="flight-dest"
          class="field-input"
          [ngModel]="destinationQuery"
          (ngModelChange)="destinationQueryChange.emit($event)"
          placeholder="e.g. Paris, CDG, Dubai…"
          autocomplete="off"
        />
        @if (suggestions.length > 0) {
          <ul class="suggest-list" role="listbox">
            @for (s of suggestions; track s.pickValue) {
              <li>
                <button type="button" class="suggest-item" (click)="onPick(s)">{{ s.label }}</button>
              </li>
            }
          </ul>
        }
      </div>
      <div class="field-block field-block-narrow">
        <label class="field-label" for="flight-origin">From (IATA)</label>
        <input
          pInputText
          id="flight-origin"
          class="field-input"
          [ngModel]="originIata"
          (ngModelChange)="originIataChange.emit($event)"
          maxlength="4"
          placeholder="TUN"
          autocomplete="off"
        />
      </div>
      <button
        pButton
        type="button"
        label="Search"
        icon="pi pi-search"
        class="search-btn"
        [loading]="loading"
        [disabled]="loading || !destinationQuery.trim()"
        (click)="onSearchClick()"
      ></button>
    </div>

    <div class="panel-divider" aria-hidden="true"></div>

    <div class="fields-stack flight-by-number">
      <h3 class="sub-block-title">Search by flight number</h3>
      <p class="sub-block-hint">Airline + number (e.g. TU712) or 1–4 digits; date is UTC (provider).</p>
      <div class="field-row">
        <div class="field-block field-grow">
          <label class="field-label" for="flight-num">Flight</label>
          <input
            pInputText
            id="flight-num"
            class="field-input"
            [ngModel]="flightNumberQuery"
            (ngModelChange)="flightNumberQueryChange.emit($event)"
            placeholder="e.g. TU712"
            autocomplete="off"
          />
        </div>
        <div class="field-block field-date">
          <label class="field-label" for="flight-date">Date (UTC)</label>
          <input
            id="flight-date"
            type="date"
            class="field-input field-input-date"
            [ngModel]="flightSearchDate"
            (ngModelChange)="flightSearchDateChange.emit($event)"
          />
        </div>
        <button
          pButton
          type="button"
          label="Find flights"
          icon="pi pi-send"
          class="search-btn search-btn-secondary"
          [loading]="loading"
          [disabled]="loading || !isFlightQueryValid()"
          (click)="onFlightSearchClick()"
        ></button>
      </div>
    </div>
  </div>
</div>
