<section class="auth-page">
  <div class="auth-bg-orb auth-bg-orb-left"></div>
  <div class="auth-bg-orb auth-bg-orb-right"></div>

  <article class="auth-card animate-in">
    <p class="auth-kicker">YallaTN Security</p>
    <h1>Nouveau mot de passe</h1>
    <p class="auth-subtitle">Saisissez un mot de passe fort pour securiser votre compte.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        Nouveau mot de passe
        <input type="password" formControlName="newPassword" placeholder="Minimum 8 caracteres" autocomplete="new-password" />
      </label>

      <label>
        Confirmer le mot de passe
        <input type="password" formControlName="confirmPassword" placeholder="Confirmer" autocomplete="new-password" />
      </label>

      @if (formError()) {
        <div class="auth-error">{{ formError() }}</div>
      }
      @if (formSuccess()) {
        <div class="auth-success">{{ formSuccess() }}</div>
      }

      <button type="submit" class="auth-submit" [disabled]="isLoading()">
        {{ isLoading() ? 'Validation...' : 'Reinitialiser le mot de passe' }}
      </button>
    </form>

    <p class="auth-switch">
      Retour a la connexion ? <a routerLink="/signin">Se connecter</a>
    </p>
  </article>
</section>
