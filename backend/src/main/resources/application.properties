spring.application.name=backend
server.port=${SERVER_PORT:9091}
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# MySQL ? base Yallatn
spring.datasource.url=jdbc:mysql://localhost:3306/Yallatn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.pool-name=YallaTnHikariPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway: allow migration bootstrapping on existing non-empty schemas
spring.flyway.enabled=false
# JWT
jwt.secret=${JWT_SECRET:change-me-use-at-least-64-chars-for-production-security-key-0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=http://localhost:4200
# Currency (ExchangeRate-API v6) ? set EXCHANGERATE_API_KEY in the environment; never commit production keys
app.currency.exchange-api-key=${EXCHANGERATE_API_KEY:}
app.currency.exchange-base-url=https://v6.exchangerate-api.com/v6
app.currency.base-currency=TND
app.currency.refresh-interval-ms=3600000
app.currency.connect-timeout-ms=8000
app.currency.read-timeout-ms=15000
# MyMemory (server-side translate proxy) ? optional contact email raises free daily quota
# Source lang for langpair (never use "auto" here ? MyMemory returns 403 / error payload; see TranslationService)
app.translate.default-source-lang=en
app.translate.mymemory-url=https://api.mymemory.translated.net/get
app.translate.contact-email=slouma12lafi@gmail.com
app.translate.daily-word-limit=4500

# Translation seeder (fills `translations` from business data + MyMemory for EN/AR). Off by default.
app.seeder.translations.enabled=false
app.seeder.translations.delay-ms=300
app.seeder.translations.max-entities=100

# Aviationstack (live flight data) ? never commit real keys; use AVIATIONSTACK_ACCESS_KEY env or application-local.properties
# Set AVIATIONSTACK_ACCESS_KEY env or override in application-local.properties (do not commit real keys)
aviationstack.access-key=${AVIATIONSTACK_ACCESS_KEY:}

# Les lignes ci-dessous sont optionnelles (valeurs par d faut suffisantes)
aviationstack.base-url=https://api.aviationstack.com/v1
aviationstack.default-limit=15
aviationstack.connect-timeout-ms=8000
aviationstack.read-timeout-ms=15000

# OpenSky Network (live ADS-B). Optional OPENSKY_BEARER_TOKEN improves quotas; anonymous /states is limited.
opensky.base-url=https://opensky-network.org/api
opensky.bearer-token=${OPENSKY_BEARER_TOKEN:}
opensky.connect-timeout-ms=8000
opensky.read-timeout-ms=15000
opensky.state-cache-seconds=12
opensky.resolve-cache-seconds=45
opensky.track-rate-limit-per-minute=24

# Amadeus Self-Service (Cars & Transfers: POST /v1/shopping/transfer-offers). Never commit production secrets.
# Create keys: https://developers.amadeus.com/ → sign up → My Self-Service Workspace → Create new app → API Key & Secret
# Test host: https://test.api.amadeus.com | Production: https://api.amadeus.com (when Amadeus promotes your app)
amadeus.enabled=${AMADEUS_ENABLED:false}
amadeus.api.key=${AMADEUS_API_KEY:}
amadeus.api.secret=${AMADEUS_API_SECRET:}
amadeus.base-url=${AMADEUS_BASE_URL:https://test.api.amadeus.com}

# OAuth2
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/signin}
app.oauth2.google-client-id=${GOOGLE_CLIENT_ID:disabled-google-client-id}
app.oauth2.google-client-secret=${GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
app.oauth2.facebook-client-id=1448995326075572
app.oauth2.facebook-client-secret=${FACEBOOK_CLIENT_SECRET:}
app.oauth2.github-client-id=Ov23liiSHrPHH0flMbQK
app.oauth2.github-client-secret=${GITHUB_CLIENT_SECRET:}
app.oauth2.instagram-client-id=${INSTAGRAM_CLIENT_ID:disabled-instagram-client-id}
app.oauth2.instagram-client-secret=${INSTAGRAM_CLIENT_SECRET:disabled-instagram-client-secret}

spring.security.oauth2.client.registration.google.client-id=${app.oauth2.google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${app.oauth2.google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${app.oauth2.github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${app.oauth2.github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.facebook.client-id=${app.oauth2.facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${app.oauth2.facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile

spring.security.oauth2.client.registration.instagram.client-id=${app.oauth2.instagram-client-id}
spring.security.oauth2.client.registration.instagram.client-secret=${app.oauth2.instagram-client-secret}
spring.security.oauth2.client.registration.instagram.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.instagram.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.instagram.scope=user_profile
spring.security.oauth2.client.registration.instagram.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.instagram.authorization-uri=https://api.instagram.com/oauth/authorize
spring.security.oauth2.client.provider.instagram.token-uri=https://api.instagram.com/oauth/access_token
spring.security.oauth2.client.provider.instagram.user-info-uri=https://graph.instagram.com/me?fields=id,username
spring.security.oauth2.client.provider.instagram.user-name-attribute=id

