<section class="login-page">
  <div class="glow glow-red"></div>
  <div class="glow glow-blue"></div>

  <div class="login-card glass-panel animate-in">
    <div class="login-logo">
      <div class="logo-symbol"><span class="ly">Y</span><span class="ldot">•</span><span class="ltn">TN</span></div>
      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Access your YallaTN space</p>
    </div>

    <div class="demo-pills">
      <button type="button" class="pill pill-admin" (click)="fill('admin')" id="demo-admin-btn">🛡️ Admin</button>
      <button type="button" class="pill pill-user"  (click)="fill('user')"  id="demo-user-btn">👤 User</button>
    </div>

    @if (error()) {
      <div class="auth-error" role="alert">{{ error() }}</div>
    }

    <form class="login-form" (ngSubmit)="submit()" novalidate>
      <div class="field" id="username_input">
        <label for="f-user" class="field-label">Username</label>
        <div class="field-wrap">
          <span class="fi">👤</span>
          <input id="f-user" type="text"     class="field-input" placeholder="admin / user"
                 [(ngModel)]="username" name="username" autocomplete="username" />
        </div>
      </div>

      <div class="field" id="password_input">
        <label for="f-pass" class="field-label">Password</label>
        <div class="field-wrap">
          <span class="fi">🔒</span>
          <input id="f-pass" [type]="showPw() ? 'text' : 'password'" class="field-input"
                 placeholder="••••••••" [(ngModel)]="password" name="password" autocomplete="current-password" />
          <button type="button" class="eye-btn" (click)="showPw.set(!showPw())" tabindex="-1">
            {{ showPw() ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary submit-btn" [disabled]="loading()" id="login_btn">
        @if (loading()) { <span class="spin"></span> Signing in… }
        @else { Sign in → }
      </button>
    </form>

    <p class="back"><a routerLink="/">← Back to home</a></p>
  </div>
</section>
