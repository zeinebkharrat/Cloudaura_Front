<section id="virtual-tour" class="virtual-tour-section">
  <div class="section-header">
    <p class="virtual-tour-kicker">{{ 'VIRTUAL_TOUR.KICKER' | translate }}</p>
    <h2 class="virtual-tour-title">{{ 'VIRTUAL_TOUR.TITLE' | translate }}</h2>
    <p
      class="virtual-tour-rotating"
      [class.virtual-tour-rotating--fade]="taglineFading()"
      aria-live="polite"
    >
      {{ taglineKey() | translate }}
    </p>
    <p class="virtual-tour-sub">
      {{ 'VIRTUAL_TOUR.DESC_PRE' | translate }}
      <code>public/</code>
      {{ 'VIRTUAL_TOUR.DESC_POST' | translate }}
    </p>
  </div>

  <div class="virtual-tour-panel glass-panel animate-in delay-1">
    <div class="scene-row" role="tablist" [attr.aria-label]="'VIRTUAL_TOUR.ARIA_SCENES' | translate">
      @for (scene of scenes; track scene.id) {
        <button
          type="button"
          class="scene-chip"
          [class.scene-chip--active]="selectedSceneId() === scene.id"
          (click)="selectScene(scene)"
          role="tab"
          [attr.aria-selected]="selectedSceneId() === scene.id"
        >
          {{ ('VIRTUAL_TOUR.SCENE_' + scene.id.toUpperCase()) | translate }}
        </button>
      }
    </div>
    <div
      #viewerHost
      class="pannellum-host"
      role="region"
      [attr.aria-label]="'VIRTUAL_TOUR.ARIA_VIEWER' | translate"
    ></div>
  </div>
</section>
