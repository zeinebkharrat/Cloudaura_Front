# ================================
# APPLICATION
# ================================
spring.application.name=backend
server.port=${SERVER_PORT:9091}

# Secrets: use environment variables or copy application-local.properties.example
# to application-local.properties (gitignored) and run with --spring.profiles.active=local

# ================================
# UPLOAD FICHIERS
# ================================
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# ================================
# BASE DE DONNÉES MySQL
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/Yallatn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ================================
# JWT
# ================================
jwt.secret=${JWT_SECRET:change-me-use-at-least-64-chars-for-production-security-key-0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:4200

# ================================
# OAuth2 — REDIRECT
# ================================
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/signin}

# ================================
# OAuth2 — GOOGLE
# ================================
app.oauth2.google-client-id=${GOOGLE_CLIENT_ID:}
app.oauth2.google-client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.client-id=${app.oauth2.google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${app.oauth2.google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ================================
# OAuth2 — GITHUB
# ================================
app.oauth2.github-client-id=${GITHUB_CLIENT_ID:}
app.oauth2.github-client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.client-id=${app.oauth2.github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${app.oauth2.github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ================================
# OAuth2 — FACEBOOK
# ================================
app.oauth2.facebook-client-id=${FACEBOOK_CLIENT_ID:}
app.oauth2.facebook-client-secret=${FACEBOOK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.facebook.client-id=${app.oauth2.facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${app.oauth2.facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile

# ================================
# OAuth2 — INSTAGRAM (désactivé)
# ================================
app.oauth2.instagram-client-id=${INSTAGRAM_CLIENT_ID:disabled-instagram-client-id}
app.oauth2.instagram-client-secret=${INSTAGRAM_CLIENT_SECRET:disabled-instagram-client-secret}
spring.security.oauth2.client.registration.instagram.client-id=${app.oauth2.instagram-client-id}
spring.security.oauth2.client.registration.instagram.client-secret=${app.oauth2.instagram-client-secret}
spring.security.oauth2.client.registration.instagram.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.instagram.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.instagram.scope=user_profile
spring.security.oauth2.client.registration.instagram.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.instagram.authorization-uri=https://api.instagram.com/oauth/authorize
spring.security.oauth2.client.provider.instagram.token-uri=https://api.instagram.com/oauth/access_token
spring.security.oauth2.client.provider.instagram.user-info-uri=https://graph.instagram.com/me?fields=id,username
spring.security.oauth2.client.provider.instagram.user-name-attribute=id

# ================================
# IMGBB
# ================================
app.imgbb.api-key=${IMGBB_API_KEY:}
app.upload.max-image-bytes=${APP_UPLOAD_MAX_IMAGE_BYTES:5242880}
imgbb.base-url=https://api.imgbb.com/1/upload
imgbb.api.key=${IMGBB_API_KEY:}

# ================================
# FRONTEND
# ================================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

# ================================
# MAIL
# ================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${spring.mail.host}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${spring.mail.username}}
mailer.dsn=${MAILER_DSN:}

# ================================
# STRIPE
# ================================
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.checkout.currency=${STRIPE_CHECKOUT_CURRENCY:usd}

# ================================
# RECAPTCHA
# ================================
app.recaptcha.version=v2
app.recaptcha.secret=${RECAPTCHA_SECRET:}
app.recaptcha.site-key=${RECAPTCHA_SITE_KEY:}
