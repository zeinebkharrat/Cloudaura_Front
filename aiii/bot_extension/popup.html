<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 250px; 
      padding: 15px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a1a;
      color: #ffffff;
    }
    h3 { color: #ff4400; margin-top: 0; }
    p { font-size: 12px; color: #888; }
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    button { 
      width: 100%; 
      padding: 10px; 
      cursor: pointer; 
      background: #333; 
      color: white; 
      border: 1px solid #444; 
      border-radius: 4px;
      transition: background 0.3s;
    }
    button:hover { background: #444; }
    button.primary { background: #ff4400; border: none; font-weight: bold; }
    button.primary:hover { background: #ff6622; }
  </style>
</head>
<body>
  <h3>ZeroTrust Bot Attack</h3>
  <p>Cette extension simule un bot pour tester la détection d'injection instantanée.</p>
  
  <div class="btn-group">
    <button id="runBot" class="primary">Lancer l'injection (Bot)</button>
    <button id="runHuman">Saisie Normale (Simulée)</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
