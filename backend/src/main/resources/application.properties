spring.application.name=backend

# Tomcat — 8081 par défaut si 8080 est déjà pris (autre instance, autre app). Surcharge : SERVER_PORT=8080
server.port=${SERVER_PORT:8089}

# MySQL — base Yallatn
spring.datasource.url=jdbc:mysql://localhost:3306/Yallatn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT (HS256 — min. 256 bits pour la clé secrète)
#jwt.secret=change-me-use-at-least-64-chars-for-production-security-key-0123456789abcdef
#jwt.expiration-ms=86400000

#app.cors.allowed-origins=http://localhost:4200
