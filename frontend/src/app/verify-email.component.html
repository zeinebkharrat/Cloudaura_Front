<section class="auth-page">
  <div class="auth-bg-orb auth-bg-orb-left"></div>
  <div class="auth-bg-orb auth-bg-orb-right"></div>

  <article class="auth-card animate-in">
    <p class="auth-kicker">YallaTN Security</p>
    <h1>Email verification</h1>

    @if (isLoading()) {
      <p class="auth-subtitle">Verifying…</p>
    } @else {
      @if (successMessage()) {
        <div class="auth-success">{{ successMessage() }}</div>
      }
      @if (errorMessage()) {
        <div class="auth-error">{{ errorMessage() }}</div>
      }
    }

    <p class="auth-switch">
      Continue to <a routerLink="/signin">Sign in</a>
    </p>
  </article>
</section>
