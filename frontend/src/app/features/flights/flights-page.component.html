<div class="flights-page">
  <header class="page-hero">
    <a routerLink="/transport" class="back-link"><i class="pi pi-arrow-left"></i> Transport hub</a>
    <div class="hero-text">
      <h1>Flight search</h1>
      <p class="sub">Search internal Tunisia routes or international flights to Tunisia.</p>
    </div>
  </header>

  <app-flight-search
    [loading]="loading"
    [flightType]="flightType"
    [from]="selectedFrom"
    [to]="selectedTo"
    [travelDate]="selectedDate"
    [minTravelDate]="minTravelDate"
    [tunisianAirports]="tunisianAirportOptions"
    [fromSuggestions]="fromSuggestions"
    [internalSearchDisabled]="internalSearchDisabled"
    [validationMessage]="searchValidationMessage"
    [fromInvalid]="!!searchValidationMessage && !selectedFrom"
    [toInvalid]="hasSameAirport"
    [dateInvalid]="hasPastDate || (!selectedDate && !!searchValidationMessage)"
    (fromChange)="onFromChange($event)"
    (toChange)="onToChange($event)"
    (travelDateChange)="onDateChange($event)"
    (pickFromSuggestion)="onPickFromSuggestion($event)"
    (swapRequested)="onSwapRequested()"
    (searchSubmit)="onSearchSubmit($event)"
  />

  @if (bookingMessage) {
    <div class="booking-state booking-success" role="status">{{ bookingMessage }}</div>
  }
  @if (bookingError) {
    <div class="booking-state booking-error" role="alert">{{ bookingError }}</div>
  }

  @if (hasSearched && apiFlights.length > 0) {
    <section class="filters-bar" aria-label="Flight filters">
      <div class="filter-group filter-price">
        <label class="filter-label" for="maxPrice">Max price</label>
        <input
          id="maxPrice"
          type="number"
          min="0"
          step="1"
          class="price-input"
          [(ngModel)]="maxPrice"
          placeholder="e.g. 500"
        />
      </div>
      <div class="filter-group filter-dd">
        <label class="filter-label" for="sortKey">Sort by</label>
        <p-dropdown
          inputId="sortKey"
          [options]="sortOptions"
          [(ngModel)]="sortKey"
          optionLabel="label"
          optionValue="value"
          styleClass="flights-filter-dropdown"
          panelStyleClass="flights-filter-panel"
        ></p-dropdown>
      </div>
      <button pButton type="button" label="Clear" class="p-button-text clear-filters" (click)="clearFiltersAndSort()"></button>
    </section>
  }

  <section class="results-section">
    <div class="results-toolbar">
      <h2 class="results-title">Results</h2>
      @if (cheapestOfferId) {
        <div class="cheapest-hint">Cheapest highlighted</div>
      }
    </div>

    <div class="content-split">
      <div class="list-col">
        <app-flight-list
          [flights]="displayFlights"
          [loading]="loading"
          [error]="error"
          [emptyMessage]="listEmptyMessage"
          [idleHint]="idleHint"
          [hasSearched]="hasSearched"
          [selected]="selected"
          [mapMode]="false"
          [cheapestOfferId]="cheapestOfferId"
          (selectFlight)="onSelectFlight($event)"
          (bookFlight)="onBookFlight($event)"
        />
      </div>
    </div>
  </section>
</div>
